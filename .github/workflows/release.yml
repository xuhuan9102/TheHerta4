name: Release Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create Release Package
        id: package
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          ZIP_NAME="TheHerta4-${TAG_NAME#v}.zip"

          PLUGIN_DIR="TheHerta4"
          mkdir -p "$PLUGIN_DIR"
          cp -r * "$PLUGIN_DIR/" 2>/dev/null || true
          rm -rf "$PLUGIN_DIR/.git" "$PLUGIN_DIR/.github" "$PLUGIN_DIR/docs"
          find "$PLUGIN_DIR" -name "__pycache__" -type d -exec rm -rf {} +
          find "$PLUGIN_DIR" -name "*.pyc" -delete
          find "$PLUGIN_DIR" -name "*.md" -delete
          rm -f "$PLUGIN_DIR/.gitignore" "$PLUGIN_DIR/README.md" "$PLUGIN_DIR/README_DEV.md" "$PLUGIN_DIR/LICENSE.txt" "$PLUGIN_DIR/requirements.txt"
          zip -r "$ZIP_NAME" "$PLUGIN_DIR"

          # 计算 SHA256
          SHA256=$(sha256sum "$ZIP_NAME" | cut -d' ' -f1)

          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

          ls -la "$ZIP_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_name }}
          body: |
            ## 自动打包版本

            **SHA256**: `${{ steps.package.outputs.sha256 }}`

            使用方法:
            1. 下载 zip 包
            2. 在 Blender 中打开 `编辑 > 偏好设置 > 插件 > 安装`
            3. 选择下载的 zip 文件
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
