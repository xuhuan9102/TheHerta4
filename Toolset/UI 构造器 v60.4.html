<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3Dmigoto 配置器 v60.6 (增强版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --input-bg: #111;
            --text-color: #ccc; --border-color: #333; --accent-color: #4fc1ff;
            --group-color: #00ff9d; --canvas-bg: #000; --grid-line: #333; --shadow: rgba(0,0,0,0.5);
            --var-color: #ff9d00;
            --ui-scale: 1.0;
            --base-font: 12px;
        }
        body.light-mode {
            --bg-color: #e0e0e0; --panel-bg: #f5f5f5; --input-bg: #fff;
            --text-color: #333; --border-color: #ccc; --accent-color: #0078d7;
            --group-color: #008040; --canvas-bg: #fff; --grid-line: #ddd; --shadow: rgba(0,0,0,0.1);
            --var-color: #d35400;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; height: 100vh; display: flex; overflow: hidden; transition: 0.3s; }
        
        .sidebar { 
            width: 360px; min-width: 300px; max-width: 50vw;
            background: var(--panel-bg); border-right: 1px solid var(--border-color); padding: 10px; 
            display: flex; flex-direction: column; overflow-y: auto; z-index: 50; 
            box-shadow: 2px 0 10px var(--shadow); resize: horizontal;
            font-size: calc(var(--base-font) * var(--ui-scale));
        }
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px; flex-wrap: wrap; gap: 5px; }
        .header-row h2 { margin: 0; font-size: 1.4em; color: var(--accent-color); }
        .theme-btn { background: transparent; border: 1px solid var(--border-color); cursor: pointer; padding: 0.4em 0.8em; border-radius: 4px; font-size: 1.2em; }
        .scale-control { display: flex; align-items: center; gap: 5px; width: 100%; margin-top: 5px; font-size: 0.9em; color: #888; }
        .scale-control input { flex: 1; cursor: pointer; }

        .panel { background: var(--bg-color); padding: 0.8em; border-radius: 4px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .panel h4 { margin: 0 0 0.8em 0; font-size: 0.9em; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        
        button { width: 100%; background: var(--panel-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 0.6em; margin-bottom: 5px; cursor: pointer; text-align: left; border-radius: 3px; font-size: 1em; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        button:hover { border-color: var(--accent-color); }
        button.primary { background: var(--accent-color); color: #fff; border: none; font-weight: bold; justify-content: center; padding: 0.8em; margin-top: 10px; }
        button.group-btn { background: var(--group-color); color: #000; border: none; font-weight: bold; justify-content: center; }
        button.danger { background: #8b0000; border-color: #a00; color: #fff; justify-content: center; }
        button.copy-btn { background: #8a2be2; color: #fff; border: none; font-weight: bold; justify-content: center; margin-bottom: 10px; }
        button.file-btn { background: #444; justify-content: center; font-weight: bold; }
        button.asset-btn { background: #d35400; color: #fff; border: none; font-weight: bold; justify-content: center; padding: 0.8em; margin-top:5px; }
        button.add-var-btn { background: #27ae60; color: #fff; justify-content: center; font-size: 0.9em; padding: 4px; }

        .input-group { margin-bottom: 0.8em; border-top: 1px dashed var(--border-color); padding-top: 0.8em; }
        
        .input-row { display: flex; gap: 0.5em; margin-bottom: 0.5em; align-items: center; justify-content: space-between; }
        .input-row label { flex: 0 0 7em; font-size: 0.9em; color: #888; text-align: right; }
        .input-row input[type="text"], .input-row input[type="number"], .input-row select { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 0.4em; font-family: monospace; font-size: 0.95em; min-width: 0; }
        .input-row textarea { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--accent-color); padding: 0.4em; font-family: monospace; font-size: 0.95em; min-height: 4em; resize: vertical; }
        .input-row .checkbox-wrapper { flex: 1; display: flex; align-items: center; }
        .input-row input[type="checkbox"] { width: 1.2em; height: 1.2em; cursor: pointer; margin: 0; appearance: auto; accent-color: var(--accent-color); }
        
        .pinned-row { display: flex; align-items: center; background: rgba(0, 255, 255, 0.1); padding: 0.6em; border: 1px solid #00cccc; border-radius: 4px; margin-bottom: 5px; justify-content: space-between;}
        .pinned-row div { display: flex; align-items: center; }
        .pinned-row input { width: 1.5em; height: 1.5em; cursor: pointer; margin-right: 10px; accent-color: #00ffff; }
        .pinned-row span.lbl { font-size: 1em; font-weight: bold; color: #0ff; }
        
        .phys-row { display: flex; align-items: center; background: rgba(0, 255, 0, 0.1); padding: 0.6em; border: 1px solid #006600; border-radius: 4px; margin-bottom: 5px; justify-content: space-between; }
        .phys-row div { display: flex; align-items: center; }
        .phys-row input { width: 1.5em; height: 1.5em; cursor: pointer; margin-right: 10px; accent-color: #00ff00; }
        .phys-row span.lbl { font-size: 1em; font-weight: bold; color: #0f0; }

        .bind-row { display: flex; align-items: center; background: rgba(155, 89, 182, 0.1); padding: 0.6em; border: 1px solid #9b59b6; border-radius: 4px; margin-bottom: 5px; justify-content: space-between; }
        .bind-row div { display: flex; align-items: center; }
        .bind-row input { width: 1.5em; height: 1.5em; cursor: pointer; margin-right: 10px; accent-color: #9b59b6; }
        .bind-row span.lbl { font-size: 1em; font-weight: bold; color: #d2b4de; }
        
        .var-tag { font-family: Consolas, monospace; font-size: 0.85em; background: rgba(0,0,0,0.5); color: #fff; padding: 2px 5px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); }

        .var-list { display: flex; flex-direction: column; gap: 3px; background: rgba(255, 165, 0, 0.05); padding: 5px; border: 1px solid rgba(255, 165, 0, 0.2); border-radius: 4px; }
        .var-item { display: flex; align-items: center; gap: 5px; }
        .var-item button { width: 25px; height: 25px; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; background: #c0392b; border: none; color: white; flex-shrink: 0; }
        .var-label { font-size: 0.85em; color: var(--var-color); width: 60px; text-align: right; font-weight: bold; }
        .var-input { color: var(--var-color) !important; font-weight: bold; border-color: var(--var-color) !important; flex: 1; }

        .res-row { display: flex; align-items: center; margin-bottom: 6px; gap: 5px; }
        .res-label { width: 4em; font-size: 0.85em; color: #888; }
        .res-path { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--accent-color); font-family: monospace; font-size: 0.85em; padding: 3px; }
        .res-upload { width: 3em; font-size: 0.85em; padding: 2px; text-align: center; cursor: pointer; background: var(--panel-bg); border: 1px solid var(--border-color); color: var(--text-color); }

        /* Sequence List Styles */
        .seq-list { display: flex; flex-direction: column; gap: 5px; background: rgba(0, 0, 0, 0.2); padding: 5px; border: 1px solid #444; border-radius: 4px; max-height: 200px; overflow-y: auto; }
        .seq-item { display: flex; align-items: center; gap: 5px; background: #2a2a2a; padding: 3px; border-radius: 3px; }
        .seq-val-input { width: 40px !important; text-align: center; color: #0f0 !important; font-weight: bold; }
        .seq-del-btn { width: 25px; height: 25px; background: #c42b1c; border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }

        .viewport { flex: 1; background: var(--canvas-bg); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #workArea { 
            width: 1280px; height: 720px; background: var(--input-bg); position: relative; 
            border: 2px solid var(--border-color); box-shadow: 0 0 50px var(--shadow);
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            transform-origin: center;
            transition: width 0.3s, height 0.3s;
        }

        .node { position: absolute; box-sizing: border-box; cursor: grab; user-select: none; transform-origin: center; }
        .node:active { cursor: grabbing; }
        .node.selected { outline: 2px solid var(--accent-color); z-index: 10000 !important; box-shadow: 0 0 8px var(--accent-color); }
        .node.selected-multi { outline: 2px dashed #888; z-index: 9999 !important; }
        
        .mod-node { 
            background: rgba(40,40,40,0.85); 
            border: 1px solid rgba(255,255,255,0.2); 
            display: flex; justify-content: center; align-items: center;
            background-size: 100% 100% !important;
        }
        .mod-node:hover { border-color: #fff; background-color: rgba(60,60,60,0.9); }
        .mod-node.grouped { border: 2px solid var(--group-color); }
        .mod-node.grouped::after { content: '🔗'; position: absolute; top: -15px; right: 0; font-size: 12px; }
        .mod-node.pinned { border: 2px solid #0ff; }
        .mod-node.pinned::before { content: '📌'; position: absolute; top: -15px; left: 0; font-size: 12px; }
        
        .mod-node.text-mode { display: flex; flex-wrap: wrap; align-content: flex-start; overflow: hidden; justify-content: flex-start; }
        .char-item { box-sizing: border-box; display: flex; align-items: center; justify-content: center; line-height: 1; }

        .vis-label { position: absolute; top: -18px; left: 0; background: var(--var-color); color: #000; font-size: 9px; padding: 2px 4px; border-radius: 2px; white-space: nowrap; pointer-events: none; opacity: 1.0; font-weight: bold; }
        
        .track, .bar-bg, .bar-fill, .handle { pointer-events: none; position: absolute; }
        
        .track { background: #333; border-radius: 2px; }
        .bar-bg { background: #1976d2; opacity: 0.9; background-size: 100% 100% !important; } 
        .bar-fill { background: #d32f2f; opacity: 0.9; background-size: 100% 100% !important; z-index: 5; } 
        .handle { background: #eee; box-shadow: 0 0 2px #000; border-radius: 2px; background-size: 100% 100% !important; z-index: 10; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center; }
        #modal-content { width: 85%; height: 85%; background: var(--panel-bg); border: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 10px; }
        textarea.code-out { flex: 1; background: var(--input-bg); color: var(--accent-color); border: none; padding: 15px; font-family: Consolas, monospace; resize: none; font-size: 12px; }
        .close-btn { align-self: flex-end; background: #c42b1c; border: none; color: white; padding: 5px 15px; cursor: pointer; margin-bottom: 5px; }
    </style>
</head>
<body class="dark-mode">

<div class="sidebar">
    <div class="header-row">
        <h2>🎨 UI 构造器 v60.6</h2>
        <button class="theme-btn" onclick="toggleTheme()">🌗</button>
        <div class="scale-control">
            <label>UI 缩放:</label>
            <input type="range" min="0.8" max="1.5" step="0.05" value="1.0" oninput="updateUIScale(this.value)">
            <span id="ui_scale_val">100%</span>
        </div>
    </div>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:10px;">
        <button class="file-btn" onclick="savePreset()">💾 保存预设</button>
        <button class="file-btn" onclick="document.getElementById('file_import').click()">📂 导入预设</button>
        <input type="file" id="file_import" style="display:none" onchange="loadPreset(this)" accept=".json">
    </div>

    <div class="panel">
        <h4>全局设置</h4>
        <div class="input-row"><label>Hash:</label><input type="text" id="char_hash" value="c209c22b" style="color:#0f0;font-weight:bold;"></div>
        <div class="input-row"><label>Match Index:</label><input type="text" id="match_index" placeholder="59679" style="color:#0f0;"></div>
        <div class="input-row">
            <label>屏幕宽高比:</label>
            <input type="number" id="global_aspect" value="1.777" step="0.001" onchange="updateAspectRatio()">
        </div>
        <div class="input-row"><label>网格吸附:</label><input type="number" id="grid_snap" value="0.025" step="0.005" oninput="updateGridVis()"></div>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <button class="group-btn" onclick="groupSelected()">🔗 编组 (Group)</button>
            <button onclick="ungroupSelected()">⛓️ 解组</button>
        </div>
    </div>

    <div class="panel">
        <h4>添加组件 (外框可拖拽)</h4>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <button onclick="addComponent('slider_h')">↔️ 水平滑轨</button>
            <button onclick="addComponent('slider_v')">↕️ 垂直滑轨</button>
            <button onclick="addComponent('joystick')">🕹️ 万向摇杆</button>
            <button onclick="addComponent('toggle')">🔘 开关</button>
            <button onclick="addComponent('static')">🖼️ 静态图片</button>
            <button onclick="addComponent('sequence')" style="background: #8e44ad; color:white;">🎞️ 序列动画</button>
            <button onclick="addComponent('text')" style="grid-column: span 2; background: #d35400; color:white;">🔤 文本框 (增强版)</button>
        </div>
    </div>

    <div class="panel" id="propPanel" style="display:none; border-color:var(--accent-color);">
        <h4 style="color:var(--accent-color)">属性设置</h4>
        <button class="copy-btn" onclick="copyPropsToSelection()">📋 应用属性到同类选中项</button>

        <!-- Pinned Checkbox -->
        <div class="pinned-row">
            <div>
                <input type="checkbox" id="p_pinned" onchange="updateData()">
                <span id="pinned_label" class="lbl">📌 默认固定</span>
            </div>
            <span id="pin_var_name" class="var-tag"></span>
        </div>

        <!-- Binding Enabled Checkbox -->
        <div class="bind-row">
            <div>
                <input type="checkbox" id="p_binding_enabled" onchange="updateData()">
                <span id="binding_label" class="lbl">启用参数绑定</span>
            </div>
            <span id="bind_var_name" class="var-tag"></span>
        </div>

        <!-- Toggle Initial Value -->
        <div class="input-row" id="row_initial_val" style="display:none; background:rgba(255,255,255,0.05); padding:5px; border-radius:3px;">
            <div class="checkbox-wrapper">
                <label style="flex:1; text-align:left; color:#fff;">🔛 初始状态 (默认开启):</label>
                <input type="checkbox" id="p_initial_val" onchange="updateData()">
            </div>
        </div>

        <!-- Sequence Logic -->
        <div id="seq_editor_group" style="display:none; padding:5px; border:1px solid #8e44ad; margin-bottom:8px;">
            <div class="input-row">
                <label style="color:#0f0;">控制变量:</label>
                <input type="text" id="p_seq_var" placeholder="$State" oninput="updateSeqVar()" style="color:#0f0; border-color:#006600;">
            </div>
            <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:5px;">
                <button style="flex:1; background:#006600;" onclick="document.getElementById('u_batch_seq').click()">📂 批量导入</button>
                <input type="file" id="u_batch_seq" multiple style="display:none" onchange="batchUploadSeq(this)" accept="image/*">
                <button style="flex:0.5;" onclick="addFrame()">+</button>
                <button style="flex:0.5; background:#880000;" onclick="clearFrames()">🗑️</button>
            </div>
            <div id="seq_list_container" class="seq-list"></div>
        </div>

        <div id="text_editor_group" style="display:none; background:rgba(211, 84, 0, 0.1); padding:5px; border:1px solid #d35400; margin-bottom:8px;">
            <div class="input-row"><label style="color:#e67e22; font-weight:bold;">文本内容:</label></div>
            <div class="input-row"><textarea id="p_text_content" oninput="updateTextContent()"></textarea></div>
            
            <div class="input-row">
                <label>字体:</label>
                <input type="text" id="p_font_family" list="font_list" value="Microsoft YaHei" onchange="updateTextProps()">
                <datalist id="font_list">
                    <option value="Microsoft YaHei">微软雅黑</option>
                    <option value="SimHei">黑体</option>
                    <option value="SimSun">宋体</option>
                    <option value="Arial">Arial</option>
                    <option value="Impact">Impact</option>
                </datalist>
            </div>
            
            <div class="input-row">
                <label style="color:#fff">样式:</label>
                <div class="checkbox-wrapper">
                    <label style="flex:0; margin-right:5px;">加粗</label>
                    <input type="checkbox" id="p_font_bold" onchange="updateTextProps()">
                    <label style="flex:0; margin-left:10px; margin-right:5px;">斜体</label>
                    <input type="checkbox" id="p_font_italic" onchange="updateTextProps()">
                </div>
            </div>

            <div class="input-row" style="background:rgba(255,255,255,0.05); border:1px solid #555; padding:5px;">
                <label style="color:#fff;">颜色设置:</label>
                <input type="color" id="p_font_color" value="#ffffff" style="flex:1; height:30px; cursor:pointer;" oninput="applyTextColor(this.value)">
                <div style="flex:2; font-size:0.8em; color:#aaa; margin-left:5px; line-height:1.2;">
                    * 选中文字修改局部<br>* 未选中则修改默认
                </div>
            </div>

            <div class="input-row">
                <label style="color:#0f0;">数值变量:</label>
                <input type="text" id="p_val_var" placeholder="替换 {val} 的变量" oninput="updateTextProps()" style="color:#0f0; border-color:#006600;">
            </div>

            <div class="input-row">
                <label style="color:#ff9d00;">可见性变量:</label>
                <input type="text" id="p_vis_var" placeholder="$Show_HP" oninput="updateTextProps()" style="color:#ff9d00; border-color:#d35400;">
            </div>

            <div class="input-row"><label>字符大小:</label><input type="number" id="p_char_size" step="0.001" onchange="updateTextProps()"></div>
            <div class="input-row"><label>行间距:</label><input type="number" id="p_line_gap" step="0.001" onchange="updateTextProps()"></div>
            <div class="input-row"><label>导出像素:</label><input type="number" id="gen_tex_size" value="128" step="16" title="字库图片分辨率"></div>
            
            <button class="asset-btn" onclick="generateAndDownloadAssets()">📦 生成彩色字库 ZIP</button>
        </div>

        <div id="logic_wrapper">
            <div class="phys-row" id="row_phys">
                <div>
                    <input type="checkbox" id="p_phys" onchange="updateData()">
                    <span id="phys_label" class="lbl">物理弹簧</span>
                </div>
                <span id="phys_var_name" class="var-tag"></span>
            </div>
            <div id="phys_config_panel" style="display:none; background:rgba(0, 255, 0, 0.05); padding:8px; border:1px solid #006600; border-radius:4px; margin-bottom:8px;">
                <h4 style="margin:0 0 8px 0; color:#0f0; font-size:0.9em;">⚙️ 弹簧物理参数配置</h4>
                <div style="font-size:0.75em; color:#888; margin-bottom:8px; padding:5px; background:rgba(0,0,0,0.3); border-radius:3px;">
                    <b style="color:#0f0;">算法说明:</b><br>
                    • <b>弹簧强度 (K)</b>: 回弹力 = 目标位置差值 × K。值越大回弹越快。<br>
                    • <b>阻尼系数 (D)</b>: 速度衰减 = 当前速度 × D。值越接近1，振荡越持久。<br>
                    • 公式: 新速度 = (当前速度 + 回弹力) × D，新位置 = 当前位置 + 新速度
                </div>
                <div class="input-row">
                    <label style="color:#0f0;">弹簧强度 (K):</label>
                    <input type="number" id="p_spring_k_val" value="0.05" step="0.01" min="0" max="1" onchange="updatePhysParamsDirect()" style="flex:1; color:#0f0; border-color:#006600;">
                </div>
                <div class="input-row">
                    <label style="color:#0f0;">阻尼系数 (D):</label>
                    <input type="number" id="p_spring_d_val" value="0.95" step="0.01" min="0" max="1" onchange="updatePhysParamsDirect()" style="flex:1; color:#0f0; border-color:#006600;">
                </div>
                <div class="input-row">
                    <label style="color:#ff0;">🌀 自动动画:</label>
                    <input type="checkbox" id="p_auto_animate" onchange="updateAutoAnimate()" style="width:1.2em; height:1.2em;">
                </div>
                <div class="input-row">
                    <label style="color:#ff0;">动画力度:</label>
                    <input type="number" id="p_auto_str" value="0.1" step="0.01" min="0" max="1" onchange="updateAutoStr()" style="flex:1; color:#ff0; border-color:#996600;">
                </div>
                <div class="input-row">
                    <label style="color:#f80;">⬇ 重力:</label>
                    <input type="number" id="p_gravity" value="0" step="0.005" min="0" max="1" onchange="updateGravity()" style="flex:1; color:#f80; border-color:#663300;">
                </div>
                <div class="input-row">
                    <label style="color:#ff0;">混沌频率:</label>
                    <input type="number" id="p_chaos_rate" value="5" step="1" min="1" max="60" onchange="updateChaosRate()" style="flex:1; color:#ff0; border-color:#996600;">
                </div>
            </div>
            <div class="input-group">
                <div class="input-row" id="row_switch_group" style="display:none;">
                    <label>开关分组ID:</label>
                    <input type="number" id="p_switch_group" step="1" min="0" value="0" onchange="updateSwitchGroup()" placeholder="0为不分组">
                </div>
                <div class="input-row" id="row_mode"><label>模式:</label><select id="p_mode" onchange="changeMode()"></select></div>
                <div class="input-row" id="row_grid_steps" style="display:none;">
                    <label>格子数量:</label>

    <div id="modal-content">
        <button class="close-btn" onclick="document.getElementById('modal').style.display='none'">关闭 X</button>

<script>
    function updateUIScale(val) {
        document.documentElement.style.setProperty('--ui-scale', val);
        document.getElementById('ui_scale_val').innerText = Math.round(val * 100) + '%';
    }

    let components = [];
    let selectedIds = [];
    let selectedId = null;

    const workArea = document.getElementById('workArea');
    const propPanel = document.getElementById('propPanel');
    const varContainer = document.getElementById('var_container');
    const modeSelect = document.getElementById('p_mode');
    const resContainer = document.getElementById('res_container');

    const DEFAULT_HS = 0.022;
    const DEFAULT_TT = 0.006;
    const BASE_HEIGHT = 720;

    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    
    function updateAspectRatio() {
        const aspect = parseFloat(document.getElementById('global_aspect').value) || 1.777;
        const w = BASE_HEIGHT * aspect;
        workArea.style.width = `${w}px`;
        workArea.style.height = `${BASE_HEIGHT}px`;
        resize();
        updateGridVis();
    }

    function resize() {
        const aspect = parseFloat(document.getElementById('global_aspect').value) || 1.777;
        const targetW = BASE_HEIGHT * aspect;
        const scale = Math.min((window.innerWidth - 380)/targetW, (window.innerHeight - 40)/BASE_HEIGHT) * 0.9;
        workArea.style.transform = `scale(${scale})`;
    }
    window.onresize = resize;
    updateAspectRatio();

    function updateGridVis() {
        const snap = parseFloat(document.getElementById('grid_snap').value);
        if(!snap || snap <= 0) return;
        const aspect = parseFloat(document.getElementById('global_aspect').value) || 1.777;
        const w = BASE_HEIGHT * aspect;
        const pxW = w * snap;
        const pxH = BASE_HEIGHT * snap;
        workArea.style.backgroundSize = `${pxW}px ${pxH}px`;
    }

    function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error || new Error('读取文件失败'));
            reader.readAsDataURL(file);
        });
    }

    function ensureEmbeddedAssetState(component) {
        if(!component.paths) component.paths = {bg: ''};
        if(!component.preview) component.preview = {};
        if(!component.embeddedAssets) component.embeddedAssets = {};
        if(component.type === 'sequence' && !component.frames) component.frames = [];

        Object.entries(component.embeddedAssets).forEach(([key, asset]) => {
            if(asset && asset.dataUrl) component.preview[key] = asset.dataUrl;
        });

        if(component.type === 'sequence') {
            component.frames.forEach(frame => {
                if(frame && frame.dataUrl) frame.preview = frame.dataUrl;
                else if(!frame || typeof frame.preview !== 'string' || !frame.preview.startsWith('data:')) frame.preview = null;
            });
        }
    }

    function collectMissingEmbeddedAssets(componentList) {
        const defaultAssets = new Set(['0.png', '1.png', '2.png', '3.png', 'draw_2d.hlsl']);
        const missingAssets = new Set();

        componentList.forEach(component => {
            const paths = component.paths || {};
            const embeddedAssets = component.embeddedAssets || {};

            Object.entries(paths).forEach(([key, relPath]) => {
                if(!relPath) return;
                const assetName = relPath.split(/[\\/]/).pop();
                if(embeddedAssets[key] && embeddedAssets[key].dataUrl) return;
                if(defaultAssets.has(assetName)) return;
                missingAssets.add(relPath);
            });

            if(component.type === 'sequence') {
                (component.frames || []).forEach(frame => {
                    if(!frame || !frame.path || frame.dataUrl) return;
                    missingAssets.add(frame.path);
                });
            }
        });

        return Array.from(missingAssets).sort();
    }

    function buildFontAssetDataMap() {
        const size = parseInt(document.getElementById('gen_tex_size').value) || 128;
        const renderTasks = new Map();

        components.forEach(m => {
            if(m.type !== 'text' || !m.textContent) return;

            const defaultColor = m.fontColor || '#ffffff';
            const overrides = m.colorOverrides || {};
            const fontStr = `${m.fontItalic?'italic':''} ${m.fontBold?'bold':''} ${size * 0.75}px "${m.fontFamily}"`.trim();
            const charsToProcess = [];

            for(let i = 0; i < m.textContent.length; i++) {
                const char = m.textContent[i];
                if(['{','}','v','a','l','\n'].includes(char)) continue;
                if(!char.trim()) continue;
                charsToProcess.push({char, color: overrides[i] || defaultColor, fontStr});
            }

            if(m.valVar) {
                for(let i = 0; i <= 9; i++) charsToProcess.push({char: i.toString(), color: defaultColor, fontStr});
            }

            charsToProcess.forEach(item => {
                const hex = item.char.charCodeAt(0).toString(16).toUpperCase();
                const colHex = item.color.replace('#','').toUpperCase();
                const signature = `${hex}_${colHex}_${item.fontStr}`;
                if(!renderTasks.has(signature)) {
                    renderTasks.set(signature, {
                        fileName: `${hex}_${colHex}.png`,
                        char: item.char,
                        color: item.color,
                        fontStr: item.fontStr,
                    });
                }
            });
        });

        if(renderTasks.size === 0) return {};

        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const fontAssets = {};

        for(const task of renderTasks.values()) {
            ctx.clearRect(0, 0, size, size);
            ctx.save();
            ctx.translate(0, size);
            ctx.scale(1, -1);
            ctx.font = task.fontStr;
            ctx.fillStyle = task.color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(task.char, size / 2, size / 2);
            ctx.restore();
            fontAssets[task.fileName] = canvas.toDataURL('image/png');
        }

        return fontAssets;
    }

    function savePreset() {
        const generatedIni = buildGeneratedINI(false);
        if(!generatedIni) return;

        const data = {
            version: "60.6",
            timestamp: Date.now(),
            hash: document.getElementById('char_hash').value,
            matchIndex: document.getElementById('match_index').value,
            aspect: document.getElementById('global_aspect').value,
            grid: document.getElementById('grid_snap').value,
            components: JSON.parse(JSON.stringify(components)),
            generated: {
                iniText: generatedIni,
                fontAssets: buildFontAssetDataMap(),
                missingAssets: []
            }
        };
        data.components.forEach(c => {
            c.preview = {};
            if(!c.embeddedAssets) c.embeddedAssets = {};
            if(c.type==='sequence') c.frames.forEach(f => { f.preview = null; });
        });
        data.generated.missingAssets = collectMissingEmbeddedAssets(data.components);

        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ui_standalone_${data.hash}_${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        if(data.generated.missingAssets.length > 0) {
            alert("预设已保存，但以下资源尚未嵌入到预设中。网页面板后处理节点只能自动复制 Toolset 默认资源，其余资源请先通过上传按钮嵌入：\n\n" + data.generated.missingAssets.join('\n'));
        }
    }

    function loadPreset(input) {
        if(!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(data.components) { 
                    components = data.components;
                    components.forEach(c => { 
                        if(!c.paths) c.paths = {bg: ''};
                        if(!c.paths.bg) c.paths.bg = ''; 
                        if(!c.preview) c.preview = {};
                        if(!c.embeddedAssets) c.embeddedAssets = {};
                        if(!c.vars) c.vars = [];
                        if(typeof c.pinned === 'undefined') c.pinned = false; 
                        if(typeof c.bindingEnabled === 'undefined') c.bindingEnabled = true;
                        if(typeof c.switchGroup === 'undefined') c.switchGroup = 0;
                        if(typeof c.initialValue === 'undefined') c.initialValue = 0;
                        if(typeof c.springK === 'undefined') c.springK = 0.05;
                        if(typeof c.springD === 'undefined') c.springD = 0.95;
                        if(!c.maxVals) c.maxVals = [];
                        if(!c.defVals) c.defVals = [];
                        if(!c.depTargets) c.depTargets = [];
                        if(!c.gridDepTargets) c.gridDepTargets = [];
                        if(typeof c.autoAnimate === 'undefined') c.autoAnimate = false;
                        if(typeof c.autoStr === 'undefined') c.autoStr = 0.1;
                        if(typeof c.gravity === 'undefined') c.gravity = 0;
                        if(typeof c.chaosRate === 'undefined') c.chaosRate = 5;
                        if(c.type === 'text') {
                            if(!c.visVar) c.visVar = ''; 
                            if(!c.valVar) c.valVar = '';
                            if(!c.fontFamily) c.fontFamily = "Microsoft YaHei";
                            if(!c.fontColor) c.fontColor = "#ffffff";
                            if(typeof c.fontBold === 'undefined') c.fontBold = true;
                            if(typeof c.fontItalic === 'undefined') c.fontItalic = false;
                            if(typeof c.colorOverrides === 'undefined') c.colorOverrides = {};
                        }
                        if(c.type === 'sequence' && !c.frames) c.frames = [];

                        ensureEmbeddedAssetState(c);
                        
                        if(c.type === 'toggle' && c.vars.length === 1 && c.vars[0].includes(',')) {
                            c.vars = c.vars[0].split(',').map(s => s.trim());
                        }
                    });
                    document.getElementById('char_hash').value = data.hash || 'c209c22b';
                    document.getElementById('match_index').value = data.matchIndex || '';
                    document.getElementById('global_aspect').value = data.aspect || 1.777;
                    document.getElementById('grid_snap').value = data.grid || 0.025;
                    selectedIds = []; selectedId = null; 
                    propPanel.style.display = 'none';
                    updateAspectRatio();
                    renderAll();
                    alert("导入成功！");
                } else { alert("格式不匹配！请使用 v40+ 预设。"); }
            } catch(err) { console.error(err); alert("文件错误！"); }
            input.value = '';
        };
        reader.readAsText(input.files[0]);
    }

    function groupSelected() {
        if(selectedIds.length < 2) return alert("请选中多个组件 (Ctrl+Click)！");
        const gid = 'group_' + Date.now();
        components.forEach(c => { if(selectedIds.includes(c.id)) c.groupId = gid; });
        renderAll();
    }
    function ungroupSelected() {
        components.forEach(c => { if(selectedIds.includes(c.id)) c.groupId = null; });
        renderAll();
    }

    function addComponent(type) {
        const id = 'comp_' + Date.now();
        let mod = {
            id, type, x: 0.35, y: 0.35, w: 0.25, h: 0.15, zIndex: 10, rot: 0,
            groupId: null, pinned: false, switchGroup: 0, bindingEnabled: true, initialValue: 0,
            handleSize: DEFAULT_HS, trackThick: DEFAULT_TT,
            physics: (type === 'joystick'), paramMode: (type === 'joystick' ? '4' : '1'), 
            vars: [], paths: {bg: ''}, preview: {}, embeddedAssets: {}, 
            textContent: "Text", charSize: 0.03, lineGap: 0.0, visVar: "", valVar: "",
            fontFamily: "Microsoft YaHei", fontColor: "#ffffff", fontBold: true, fontItalic: false,
            colorOverrides: {}, 
            seqVar: "$State", frames: [],
            springK: 0.05, springD: 0.95,
            maxVals: [], defVals: [], depTargets: [], gridDepTargets: [],
            autoAnimate: false, autoStr: 0.1, gravity: 0, chaosRate: 5
        };

        let ts = Date.now().toString().substr(-3);
        if(type==='slider_h') { mod.w=0.4; mod.h=0.15; mod.vars=[`$Param_${ts}`]; mod.maxVals=[1]; mod.defVals=[0]; mod.depTargets=[[]]; Object.assign(mod.paths, {handle:'1.png', bar_l:'2.png', bar_r:'3.png'}); }
        else if(type==='slider_v') { mod.w=0.15; mod.h=0.4; mod.vars=[`$Param_${ts}`]; mod.maxVals=[1]; mod.defVals=[0]; mod.depTargets=[[]]; Object.assign(mod.paths, {handle:'1.png', bar_l:'2.png', bar_r:'3.png'}); }
        else if(type==='joystick') { mod.w=0.3; mod.h=0.3 * (1.777); mod.vars=[`$Up_${ts}`,`$Down_${ts}`,`$Left_${ts}`,`$Right_${ts}`]; mod.maxVals=[1,1,1,1]; mod.defVals=[0,0,0,0]; mod.depTargets=[[],[],[],[]]; Object.assign(mod.paths, {handle:'1.png', bar_l:'2.png'}); }
        else if(type==='toggle') { mod.w=0.15; mod.h=0.2; mod.vars=[`$Toggle_${ts}`]; Object.assign(mod.paths, {off:'4_off.png', on:'4_on.png'}); mod.physics=false; }
        else if(type==='static') { mod.w=0.3; mod.h=0.3; mod.vars=[]; Object.assign(mod.paths, {img:'static.png'}); mod.physics=false; mod.zIndex=5; }
        else if(type==='text') { mod.w=0.4; mod.h=0.2; mod.vars=[]; mod.physics=false; mod.zIndex=20; mod.textContent = "吃了 {val} 次"; }
        else if(type==='sequence') { mod.w=0.3; mod.h=0.3; mod.vars=[]; mod.physics=false; mod.zIndex=15; mod.frames=[{val:0, path:'', preview:null, dataUrl:null}]; }

        components.push(mod);
        renderAll(); 
        selectItem(id, false);
    }

    function copyPropsToSelection() {
        if(selectedIds.length < 2) return;
        const source = components.find(m => m.id === selectedId);
        if(!source) return;
        let count = 0;
        selectedIds.forEach(sid => {
            if(sid === selectedId) return;
            const target = components.find(m => m.id === sid);
            if(target) {
                target.w = source.w; target.h = source.h; target.zIndex = source.zIndex; target.rot = source.rot;
                target.pinned = source.pinned; 
                if(target.type === source.type) {
                     if(target.type.includes('slider')) { target.handleSize = source.handleSize; target.trackThick = source.trackThick; }
                     if(target.type === 'toggle') { target.switchGroup = source.switchGroup; target.vars = [...source.vars]; }
                     if(target.type === 'text') { 
                         target.charSize = source.charSize; target.lineGap = source.lineGap; 
                         target.visVar = source.visVar; target.valVar = source.valVar; 
                         target.fontFamily = source.fontFamily; target.fontColor = source.fontColor;
                         target.fontBold = source.fontBold; target.fontItalic = source.fontItalic;
                     }
                     if(target.type === 'sequence') { target.seqVar = source.seqVar; }
                }
                count++;
            }
        });
        renderAll();
        alert(`已应用到 ${count} 个组件。`);
    }

    function selectItem(id, isMulti = false, skipRender = false) {
        if(isMulti) {
            if(selectedIds.includes(id)) {
                selectedIds = selectedIds.filter(i=>i!==id);
            } else {
                selectedIds.push(id);
            }
            selectedId = selectedIds.length > 0 ? selectedIds[selectedIds.length-1] : null;
        } else {
            selectedId = id;
            selectedIds = [id];
        }
        
        if(!skipRender) renderAll(); else highlightDOM();
        updatePropPanel();
    }

    function highlightDOM() {
        document.querySelectorAll('.node').forEach(el => el.classList.remove('selected', 'selected-multi'));
        selectedIds.forEach(sid => {
            const el = document.getElementById(sid);
            if(el) el.classList.add(selectedIds.length > 1 && sid !== selectedId ? 'selected-multi' : 'selected');
        });
    }

    function selectedObj() {
        if(!selectedId) return null;
        return components.find(m=>m.id===selectedId);
    }

    function updatePropPanel() {
        let obj = selectedObj();
        if(!obj) { propPanel.style.display = 'none'; return; }
        propPanel.style.display = 'block';

        let objIndex = components.findIndex(c => c.id === obj.id);

        document.getElementById('p_x').value = obj.x.toFixed(3);
        document.getElementById('p_y').value = obj.y.toFixed(3);
        document.getElementById('p_w').value = obj.w.toFixed(3);
        document.getElementById('p_h').value = obj.h.toFixed(3);
        document.getElementById('p_z').value = obj.zIndex || 0;
        document.getElementById('p_rot').value = obj.rot || 0;
        
        document.getElementById('p_pinned').checked = (obj.pinned === true);
        document.getElementById('pin_var_name').innerText = `$pin_mode_${objIndex}`;

        document.getElementById('p_binding_enabled').checked = (obj.bindingEnabled !== false); 
        document.getElementById('bind_var_name').innerText = `$bind_mode_${objIndex}`;

        const logicWrap = document.getElementById('logic_wrapper');
        const visGroup = document.getElementById('vis_group');
        const rowPhys = document.getElementById('row_phys');
        const textGroup = document.getElementById('text_editor_group');
        const seqGroup = document.getElementById('seq_editor_group');
        const resGroup = document.getElementById('res_container');
        const rowSwitchGroup = document.getElementById('row_switch_group');
        const btnAddVar = document.getElementById('btn_add_var');
        const rowInitial = document.getElementById('row_initial_val');

        textGroup.style.display = 'none';
        seqGroup.style.display = 'none';
        logicWrap.style.display = 'none';
        visGroup.style.display = 'none';
        rowPhys.style.display = 'none';
        rowSwitchGroup.style.display = 'none';
        btnAddVar.style.display = 'none';
        rowInitial.style.display = 'none';

        if(obj.type === 'text') {
            textGroup.style.display = 'block';
            document.getElementById('p_text_content').value = obj.textContent || '';
            document.getElementById('p_char_size').value = obj.charSize || 0.03;
            document.getElementById('p_line_gap').value = obj.lineGap || 0.0;
            document.getElementById('p_vis_var').value = obj.visVar || '';
            document.getElementById('p_val_var').value = obj.valVar || '';
            
            document.getElementById('p_font_family').value = obj.fontFamily || 'Microsoft YaHei';
            document.getElementById('p_font_color').value = obj.fontColor || '#ffffff';
            document.getElementById('p_font_bold').checked = obj.fontBold;
            document.getElementById('p_font_italic').checked = obj.fontItalic;
            
            renderResInputs(obj, true);
        } else if (obj.type === 'sequence') {
            seqGroup.style.display = 'block';
            document.getElementById('p_seq_var').value = obj.seqVar || '';
            renderSeqList(obj);
            renderResInputs(obj, true);
        } else if (obj.type === 'static') {
            renderResInputs(obj);
        } else {
            // Interactive Widgets
            logicWrap.style.display = 'block';
            const rowMode = document.getElementById('row_mode');
            if(obj.type==='toggle') {
                rowMode.style.display = 'none';
                rowSwitchGroup.style.display = 'flex';
                document.getElementById('p_switch_group').value = obj.switchGroup || 0;
                btnAddVar.style.display = 'flex'; 
                
                // Show Initial Value for Toggle
                rowInitial.style.display = 'flex';
                document.getElementById('p_initial_val').checked = (obj.initialValue === 1);
            }
            else { 
                rowMode.style.display = 'flex'; updateModeSelect(obj.type); document.getElementById('p_mode').value = obj.paramMode; 
                
                // 显示格子数量设置
                const rowGridSteps = document.getElementById('row_grid_steps');
                if(obj.type.includes('slider') && obj.paramMode === '3') {
                    rowGridSteps.style.display = 'flex';
                    document.getElementById('p_grid_steps').value = obj.gridSteps || 3;
                } else {
                    rowGridSteps.style.display = 'none';
                }
            }

            visGroup.style.display = (obj.type==='toggle') ? 'none' : 'block';
            if(obj.type!=='toggle') {
                document.getElementById('p_hs').value = obj.handleSize;
                document.getElementById('p_tt').value = obj.trackThick;
            }

            if(obj.type==='toggle') { rowPhys.style.display = 'none'; }
            else {
                rowPhys.style.display = 'flex';
                const pBox = document.getElementById('p_phys');
                const pLbl = document.getElementById('phys_label');
                const pVar = document.getElementById('phys_var_name');
                const physConfigPanel = document.getElementById('phys_config_panel');
                pBox.checked = (obj.physics === true);
                pBox.disabled = false;
                pVar.innerText = `$phys_mode_${objIndex}`;
                
                if(obj.type.includes('slider') && (obj.paramMode === '1' || obj.paramMode === '3')) {
                    pBox.disabled = true; pBox.checked = false; obj.physics = false;
                    pLbl.innerText = "不可用 (仅分裂/摇杆)"; pLbl.style.color = "#666";
                    pVar.innerText = "";
                    physConfigPanel.style.display = 'none';
                } else {
                    pLbl.innerText = obj.physics ? "物理: 默认开启" : "物理: 默认关闭"; 
                    pLbl.style.color = obj.physics ? "#0f0" : "#aaa";
                    
                    if(obj.physics) {
                        physConfigPanel.style.display = 'block';
                        document.getElementById('p_spring_k_val').value = obj.springK || 0.05;
                        document.getElementById('p_spring_d_val').value = obj.springD || 0.95;
                        document.getElementById('p_auto_animate').checked = obj.autoAnimate || false;
                        document.getElementById('p_auto_str').value = obj.autoStr || 0.1;
                        document.getElementById('p_gravity').value = obj.gravity || 0;
                        document.getElementById('p_chaos_rate').value = obj.chaosRate || 5;
                    } else {
                        physConfigPanel.style.display = 'none';
                    }
                }
            }
            renderVarInputs(obj);
            renderResInputs(obj);
        }
    }

    window.applyTextColor = (val) => {
        let o = selectedObj();
        if(!o) return;

    window.uploadSeqFrame = async (i, input) => {
        if(input.files[0]) {
            let o = selectedObj();
            if(!o || !o.frames[i]) return;
            try {
                const file = input.files[0];
                const dataUrl = await readFileAsDataURL(file);
                let f = o.frames[i];
                f.path = file.name;
                f.dataUrl = dataUrl;
                f.preview = dataUrl;
                renderSeqList(o);
                renderAll();
            } catch(err) {
                console.error(err);
                alert('读取序列帧失败！');
            }
            input.value = '';
        }
    }
    window.batchUploadSeq = async (input) => {
        if(input.files && input.files.length > 0) {
            let o = selectedObj();
            if(!o) return;
            const files = Array.from(input.files).sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));
            const fileDataList = await Promise.all(files.map(async file => ({
                file,
                dataUrl: await readFileAsDataURL(file)
            })));

            fileDataList.forEach(({file, dataUrl}, idx) => {
                let val = idx;
                const match = file.name.match(/(\d+)/);
                if (match) val = parseInt(match[0]); else val = o.frames.length;
                o.frames.push({ val: val, path: file.name, preview: dataUrl, dataUrl: dataUrl });
            });
            input.value = '';
            renderSeqList(o);
            renderAll();
        }
    }

    async function generateAndDownloadAssets() {
        if (!window.JSZip) { alert("JSZip 未加载！"); return; }
        const zip = new JSZip();
        const fontFolder = zip.folder("font");
        const btn = document.querySelector('.asset-btn');
        const oldText = btn.innerText; btn.innerText = "⏳ 处理中...";

        const fontAssets = buildFontAssetDataMap();
        if(Object.keys(fontAssets).length === 0) { alert("无文字可生成。"); btn.innerText = oldText; return; }

        try {
            for (const [fileName, dataUrl] of Object.entries(fontAssets)) {
                const blob = await fetch(dataUrl).then(r => r.blob());
                fontFolder.file(fileName, blob);
            }
            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `font_assets_${Date.now()}.zip`;
            link.click();
        } catch(e) { alert("Error: " + e.message); } 
        finally { btn.innerText = oldText; }
    }

    function renderAll() {
        workArea.innerHTML = '';
        components.forEach(mod => {
            let mDiv = mkDiv(mod.id, 'node mod-node', mod);
            mDiv.style.zIndex = mod.zIndex; 
            mDiv.style.transform = `rotate(${mod.rot||0}deg)`;

            if(selectedId === mod.id) mDiv.classList.add('selected');
            else if(selectedIds.includes(mod.id)) mDiv.classList.add('selected-multi');
            if(mod.groupId) mDiv.classList.add('grouped');
            if(mod.pinned) mDiv.classList.add('pinned');

            if(mod.preview && mod.preview.bg) {
                mDiv.style.backgroundImage = `url(${mod.preview.bg})`;
                mDiv.style.backgroundColor = 'transparent';
            }

            const hs = (mod.handleSize||0.02)*500+'px'; 
            const tt = (mod.trackThick||0.006)*500+'px';
            const tex = mod.preview;
            const bgCss = (u) => u ? `background-image:url(${u});background-color:transparent;` : '';
            let html = '';
            
            if(mod.type === 'static') {
                 html += `<div class="vis-label">Img (Z:${mod.zIndex})</div>`;
                 html += `<div style="width:100%;height:100%;${bgCss(tex.img)||'display:flex;align-items:center;justify-content:center;color:#aaa;'}"></div>`;
            } else if (mod.type === 'sequence') {
                 html += `<div class="vis-label">Seq (Z:${mod.zIndex})</div>`;
                 let firstFrame = mod.frames.find(f => f.preview);
                 let previewCss = firstFrame ? `background-image:url(${firstFrame.preview});background-color:transparent;` : 'background-color:rgba(142, 68, 173, 0.5);';
                 html += `<div style="width:100%;height:100%;${previewCss} background-size:100% 100%;"></div>`;
            } else if (mod.type === 'text') {
                html += `<div class="vis-label">Text (Z:${mod.zIndex})</div>`;
                mDiv.classList.add('text-mode');
                const aspect = parseFloat(document.getElementById('global_aspect').value) || 1.777;
                const baseW = BASE_HEIGHT * aspect;
                const charPx = (mod.charSize || 0.03) * baseW; 
                const gapPx = (mod.lineGap || 0) * baseW; 
                mDiv.style.gap = '0px'; 
                mDiv.style.fontFamily = mod.fontFamily || 'Microsoft YaHei';
                mDiv.style.fontWeight = mod.fontBold ? 'bold' : 'normal';
                mDiv.style.fontStyle = mod.fontItalic ? 'italic' : 'normal';
                let txt = mod.textContent || '';
                if(mod.valVar) txt = txt.replace('{val}', '100'); 
                let overrides = mod.colorOverrides || {};
                let defaultColor = mod.fontColor || '#ffffff';
                if(txt) {
                    for (let i=0; i<txt.length; i++) {
                        let char = txt[i];
                        if(char === '\n') {
                            html += `<div style="width:100%; height:0; margin-bottom:${gapPx}px"></div>`; 
                        } else if (char === ' ') {
                            html += `<div style="width:${charPx}px; height:${charPx}px; display:inline-block; margin-bottom:${gapPx}px"></div>`;
                        } else {
                            let col = overrides[i] || defaultColor;
                            html += `<div class="char-item" style="color:${col}; width:${charPx}px; height:${charPx}px; font-size:${charPx*0.8}px; margin-bottom:${gapPx}px">${char}</div>`;
                        }
                    }
                } else html += `<span style="color:#555;font-size:10px;padding:5px;">空文本</span>`;
            } else {
                let l = mod.vars[0]||'..'; 
                if(mod.switchGroup > 0) l += ` [G:${mod.switchGroup}]`;
                if(mod.physics) l+=' (P)';
                if(mod.type.includes('slider') && mod.paramMode === '3') {
                    l += ` [Grd:${mod.gridSteps||3}]`;
                }
                html += `<div class="vis-label">${l}</div>`;
                if (mod.type.includes('slider')) {
                    const isV = mod.type === 'slider_v';
                    const dim = isV ? `width:${tt};height:100%` : `width:100%;height:${tt}`;
                    html += `<div style="position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">`;
                    if(mod.paramMode==='2') {
                        if(!isV) {
                            html += `<div class="bar-bg" style="width:100%;height:${tt};${bgCss(tex.bar_r)}"></div>`;
                            html += `<div class="bar-fill" style="width:50%;height:${tt};${bgCss(tex.bar_l)}"></div>`;
                        } else {
                            html += `<div class="bar-bg" style="height:100%;width:${tt};${bgCss(tex.bar_r)}"></div>`;
                            html += `<div class="bar-fill" style="height:50%;width:${tt};${bgCss(tex.bar_l)}"></div>`;
                        }
                    } else if(mod.paramMode === '3') {
                        // 格子模式显示
                        const gridSteps = mod.gridSteps || 3;
                        html += `<div class="track" style="${dim}"></div>`;
                        // 绘制格子标记
                        for(let s=0; s<gridSteps; s++) {
                            const pos = (s / (gridSteps-1)) * 100;
                            if(!isV) {
                                html += `<div style="position:absolute; left:${pos}%; top:50%; transform:translate(-50%, -50%); width:1px; height:${tt}; background:#ff9800;"></div>`;
                            } else {
                                html += `<div style="position:absolute; top:${100-pos}%; left:50%; transform:translate(-50%, -50%); width:${tt}; height:1px; background:#ff9800;"></div>`;
                            }
                        }
                        if(!isV) html += `<div class="bar-fill" style="width:50%;height:${tt};${bgCss(tex.bar_l)}"></div>`;
                        else html += `<div class="bar-fill" style="height:50%;width:${tt};${bgCss(tex.bar_l)}"></div>`;
                    } else {
                         html += `<div class="track" style="${dim}"></div>`;
                        if(!isV) html += `<div class="bar-fill" style="width:50%;height:${tt};${bgCss(tex.bar_l)}"></div>`;
                        else html += `<div class="bar-fill" style="height:50%;width:${tt};${bgCss(tex.bar_l)}"></div>`;
                    }
                    html += `<div class="handle" style="width:${hs};height:${hs};${bgCss(tex.handle)}"></div>`;
                    html += `</div>`;
                } else if(mod.type==='joystick') {
                    html += `<div style="position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">`;
                    html += `<div class="track" style="width:100%;height:1px;position:absolute;${bgCss(tex.bar_l)}"></div><div class="track" style="height:100%;width:1px;position:absolute;${bgCss(tex.bar_l)}"></div>`;
                    html += `<div class="handle" style="width:${hs};height:${hs};background:#0078d7;${bgCss(tex.handle)}"></div>`;
                    html += `</div>`;
                } else if(mod.type==='toggle') {
                    html += `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;${bgCss(tex.off)}">SW</div>`;
                }
            }
            mDiv.innerHTML = html;
            mDiv.onmousedown = (e) => startDrag(e, mod, mDiv);
            mDiv.onclick = (e) => { e.stopPropagation(); selectItem(mod.id, e.ctrlKey); };

    function mkDiv(id, cls, obj) {
        let d = document.createElement('div'); d.id=id; d.className=cls;
        d.style.left=(obj.x*100)+'%'; d.style.top=(obj.y*100)+'%';
        d.style.width=(obj.w*100)+'%'; d.style.height=(obj.h*100)+'%'; return d;
    }

    function startDrag(e, obj, el) {
        e.stopPropagation();
        if (!selectedIds.includes(obj.id) && !e.ctrlKey) {
            selectItem(obj.id, false, true); 
        } else if (e.ctrlKey && !selectedIds.includes(obj.id)) {
             selectItem(obj.id, true, true);
        }
        const startX = e.clientX, startY = e.clientY;
        const snap = parseFloat(document.getElementById('grid_snap').value) || 0;
        let movingIds = new Set();
        selectedIds.forEach(sid => {
            movingIds.add(sid); 
            const item = components.find(c=>c.id===sid);
            if(item && item.groupId) {
                components.forEach(c => { if(c.groupId === item.groupId) movingIds.add(c.id); });
            }
        });
        let targets = components.filter(c => movingIds.has(c.id));
        const move = (ev) => {
            let dx = (ev.clientX - startX) / workArea.clientWidth;
            let dy = (ev.clientY - startY) / workArea.clientHeight;
            targets.forEach(c => {
                let el = document.getElementById(c.id);
                if(!c.initial) { c.initial = {x: c.x, y: c.y}; }
                let nx = c.initial.x + dx;
                let ny = c.initial.y + dy;
                if(snap > 0) { nx = Math.round(nx/snap)*snap; ny = Math.round(ny/snap)*snap; }
                c.x = nx; c.y = ny;
                if(el) { el.style.left = (nx*100)+'%'; el.style.top = (ny*100)+'%'; }
            });
            if(selectedObj()) {
                document.getElementById('p_x').value = selectedObj().x.toFixed(3);
                document.getElementById('p_y').value = selectedObj().y.toFixed(3);
            }
        };
        const stop = () => { 
            targets.forEach(c => delete c.initial);
            window.removeEventListener('mousemove', move); 
            window.removeEventListener('mouseup', stop); 
            renderAll(); 
        };
        window.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
    }

    function buildGeneratedINI(showModal = true) {
        try {
            let resMap={}; let getRes=(p)=>{if(p&&!resMap[p]) resMap[p]=`Resource_${p.replace(/[\/\.]/g,'_')}`; return resMap[p]};
            let fontResMap = {}; let fontResourceDefs = new Map(); let groups = new Set();
            components.forEach(m => { if(m.groupId) groups.add(m.groupId); });
            
            // 1. GATHER ALL VARS FOR DECLARATION
            let declaredVars = new Set();
            components.forEach(m=>{ 
                if(m.paths && m.paths.bg) getRes(m.paths.bg);
                if(m.type === 'text') {
                    if(m.visVar) declaredVars.add(m.visVar);
                    if(m.valVar) declaredVars.add(m.valVar);
                    
                    // Resources
                    let overrides = m.colorOverrides || {};
                    let defCol = m.fontColor || '#ffffff';
                    for(let i=0; i<m.textContent.length; i++) {
                        let char = m.textContent[i];
                        if (['{','}','v','a','l','\n'].includes(char)) continue;
                        if(char.trim()) {
                            let col = overrides[i] || defCol;
                            let hex = char.charCodeAt(0).toString(16).toUpperCase();
                            let colHex = col.replace('#','').toUpperCase();
                            let resKey = `${hex}_${colHex}`;
                            fontResourceDefs.set(resKey, `${resKey}.png`);
                        }
                    }
                    if(m.valVar) {
                        for(let i=0; i<=9; i++) {
                            let s = i.toString(); let col = defCol; 
                            let hex = s.charCodeAt(0).toString(16).toUpperCase();
                            let colHex = col.replace('#','').toUpperCase();
                            let resKey = `${hex}_${colHex}`;
                            fontResourceDefs.set(resKey, `${resKey}.png`);
                        }
                    }
                } else if (m.type === 'sequence') {
                    m.frames.forEach(f => { if(f.path) getRes(f.path); });
                } else { 
                    for(let k in m.paths) if(k!=='bg') getRes(m.paths[k]); 
                }
                
                // Collect depTarget vars
                if(m.depTargets) {
                    m.depTargets.forEach(targets => {
                        if(targets && targets.length > 0) {
                            targets.forEach(t => {
                                if(t.var && t.var.trim()) {
                                    declaredVars.add(t.var.trim());
                                }
                            });
                        }
                    });
                }
            });

            const hash = document.getElementById('char_hash').value || 'c209c22b';
            const matchIndex = document.getElementById('match_index').value;
            const userAspect = parseFloat(document.getElementById('global_aspect').value) || 1.777;
            const rad = (d) => (d * Math.PI / 180).toFixed(6);

            let t = `; Generated v60.6 (Enhanced)\n[TextureOverrideCheckHash]\nhash = ${hash}\n`;
            if (matchIndex) {
                t += `match_index_count = ${matchIndex}\n`;
            }
            t += `$active = 1\n`;
            for(let p in resMap) t+=`[${resMap[p]}]\nfilename = ./res/${p}\n`;
            for (let [resKey, filename] of fontResourceDefs) t += `[Resource_Char_${resKey}]\nfilename = ./font/${filename}\n`;

            t+=`\n[KeyHelp]\nkey = no_ctrl no_alt home\ntype = press\nrun = CommandListToggleHelp\n`;
            t+=`\n[KeyLayoutMode]\ncondition = $help == 1\nkey = ctrl e\ntype = press\nrun = CommandListToggleLayout\n`;
            
            t+=`\n[CommandListToggleHelp]\n`;
            t+=`if $help == 1\n`;
            t+=`    $help = 0\n`;
            components.forEach((m,i) => {
                if(m.type==='static' || m.type==='toggle' || m.type==='text' || m.type==='sequence') return;
                t+=`    $saved_bind_${i} = $bind_mode_${i}\n`;
                t+=`    $bind_mode_${i} = 0\n`;
            });
            t+=`else\n`;
            t+=`    $help = 1\n`;
            components.forEach((m,i) => {
                if(m.type==='static' || m.type==='toggle' || m.type==='text' || m.type==='sequence') return;
                t+=`    if $saved_bind_${i} == 1\n`;
                t+=`        $bind_mode_${i} = 1\n`;
                t+=`    endif\n`;
            });
            t+=`endif\n`;
            
            t+=`\n[CommandListToggleLayout]\nif $layout_mode == 1\n    $layout_mode = 0\nelse\n    $layout_mode = 1\nendif\n`;
            t+=`\n[KeyResetPosition]\ncondition = $help == 1 && $active == 1\nkey = ctrl home\ntype = cycle\n$zoom_global = 1.0\n`;

            t+=`[Constants]\nglobal persist $active\nglobal persist $help = 0\nglobal persist $layout_mode = 0\n`;
            t+=`global $mouse_clicked\nglobal $is_dragging\nglobal $drag_action = 0\nglobal $drag_dx\nglobal $drag_dy\nglobal persist $zoom_global = 1.0\nglobal $aspect = ${userAspect}\nglobal $sw\nglobal $sh\nglobal $tt\nglobal $spring_k = 0.05\nglobal $spring_d = 0.95\nglobal $force\n`;
            t+=`global $cx\nglobal $cy\nglobal $dx\nglobal $dy\nglobal $rx\nglobal $ry\nglobal $c_rot\nglobal $s_rot\nglobal $w_draw\nglobal $h_draw\n`;
            t+=`global $val_int\nglobal $d1\nglobal $d2\nglobal $d3\nglobal $temp\n\n`;
            t+=`global $prev_cursor_x\nglobal $prev_cursor_y\nglobal $cursor_delta_x\nglobal $cursor_delta_y\n\n`;

                            }
                            
                            if(useElse) {
                                t+=`    if $bind_mode_${i} == 1\n        if ${cond}\n            ${depTarget} = ${trueVal}\n        else\n            ${depTarget} = ${falseVal}\n        endif\n    endif\n`;
                            } else {
                                t+=`    if $bind_mode_${i} == 1\n        if ${cond}\n            ${depTarget} = ${trueVal}\n        endif\n    endif\n`;
                            }
                        });
                    }
                } else {
                    m.depTargets.forEach((targets, vi) => {
                        if(!targets || targets.length === 0) return;
                        
                        targets.forEach(target => {
                            if(!target.var || !target.var.trim()) return;
                            
                            let depTarget = target.var.trim();
                            let inverted = target.invert || false;
                            let useElse = target.else || false;
                            let trueVal = inverted ? 0 : 1;
                            let falseVal = inverted ? 1 : 0;
                            
                            if(m.type === 'joystick') {
                                let valSrc, cond;
                                if(m.paramMode === '4') {
                                    if(vi === 0) { valSrc = `$val_${i}_y`; cond = `${valSrc} >= 0.001`; }
                                    else if(vi === 1) { valSrc = `$val_${i}_y`; cond = `${valSrc} <= -0.001`; }
                                    else if(vi === 2) { valSrc = `$val_${i}_x`; cond = `${valSrc} <= -0.001`; }
                                    else { valSrc = `$val_${i}_x`; cond = `${valSrc} >= 0.001`; }
                                } else {
                                    valSrc = (vi === 0) ? `$val_${i}_x` : `$val_${i}_y`;
                                    cond = `${valSrc} >= 0.001`;
                                }
                                
                                if(useElse) {
                                    t+=`    if $bind_mode_${i} == 1\n        if ${cond}\n            ${depTarget} = ${trueVal}\n        else\n            ${depTarget} = ${falseVal}\n        endif\n    endif\n`;
                                } else {
                                    t+=`    if $bind_mode_${i} == 1\n        if ${cond}\n            ${depTarget} = ${trueVal}\n        endif\n    endif\n`;
                                }
                            } else {
                                if(useElse) {
                                    t+=`    if $bind_mode_${i} == 1\n        if ${valVar} >= 0.001\n            ${depTarget} = ${trueVal}\n        else\n            ${depTarget} = ${falseVal}\n        endif\n    endif\n`;
                                } else {
                                    t+=`    if $bind_mode_${i} == 1\n        if ${valVar} >= 0.001\n            ${depTarget} = ${trueVal}\n        endif\n    endif\n`;
                                }
                            }
                        });
                    });
                }
            });

            t+=`\n    ; Render Queue\n`;
            let renderQueue = [];
            let baseParams = (i) => `x86=$rot_${i}\n y86=$aspect\n`;

            components.forEach((m,i) => {
                let mCmd = "";
                let bp = baseParams(i);
                
                let drawCond = `if $help == 1 || $pin_mode_${i} == 1\n`;
                let endDraw = `endif\n`;
                if(m.type === 'text' && m.visVar && m.visVar.trim() !== '') {
                    drawCond = `if ($help == 1 || $pin_mode_${i} == 1) && ${m.visVar} == 1\n`;
                }
                mCmd += drawCond;
                
                if(m.paths && m.paths.bg) {
                    mCmd += `    ps-t100=${getRes(m.paths.bg)}\n x87=$abs_w_${i}\n y87=$abs_h_${i}\n z87=$abs_x_${i}\n w87=$abs_y_${i}\n ${bp} run=CustomShaderDraw\n`;
                }
                
                if(m.type === 'toggle') {
                    mCmd += `    if $val_${i}==0\n ps-t100=${getRes(m.paths.off)}\n else\n ps-t100=${getRes(m.paths.on)}\n endif\n x87=$abs_w_${i}\n y87=$abs_h_${i}\n z87=$abs_x_${i}\n w87=$abs_y_${i}\n ${bp} run=CustomShaderDraw\n`; 
                }
                else if(m.type === 'static' && m.paths.img) {
                    mCmd += `    ps-t100=${getRes(m.paths.img)}\n x87=$abs_w_${i}\n y87=$abs_h_${i}\n z87=$abs_x_${i}\n w87=$abs_y_${i}\n ${bp} run=CustomShaderDraw\n`;
                } else if(m.type === 'sequence' && m.seqVar) {
                    m.frames.forEach(f => {
                        if(f.path) mCmd += `    if ${m.seqVar} == ${f.val}\n        ps-t100=${getRes(f.path)}\n        x87=$abs_w_${i}\n y87=$abs_h_${i}\n z87=$abs_x_${i}\n w87=$abs_y_${i}\n ${bp} run=CustomShaderDraw\n    endif\n`;
                    });
                } else if(m.type === 'text' && m.textContent) {
                    mCmd += `    ; Text Block ${i} \n`;
                    mCmd += `    $sw = ${m.charSize.toFixed(4)} * $zoom_global\n    $sh = $sw * $aspect\n`;
                    let rel_char_w = m.charSize;
                    let rel_char_h = (m.charSize * userAspect);
                    let rel_line_gap = (m.lineGap * userAspect);
                    let cursorX = 0; let cursorY = 0;
                    let parts = m.textContent.split('{val}');
                    if(parts.length > 1 && m.valVar) {
                        mCmd += `    $val_int = ${m.valVar}\n    $d1 = $val_int % 10\n    $temp = ($val_int - $d1) / 10\n    $d2 = $temp % 10\n    $temp = ($temp - $d2) / 10\n    $d3 = $temp % 10\n`;
                    }
                    let overrides = m.colorOverrides || {};
                    let defCol = m.fontColor || '#ffffff';
                    let globalIdx = 0;
                    for(let pIdx=0; pIdx<parts.length; pIdx++) {
                        let part = parts[pIdx];
                        for(let c of part) {
                            if(c === '\n') { cursorX = 0; cursorY += rel_char_h + rel_line_gap; globalIdx++; continue; }
                            if(cursorX + m.charSize > m.w) { cursorX = 0; cursorY += rel_char_h + rel_line_gap; }
                            if(c.trim() !== '') {
                                let locX = cursorX + rel_char_w/2 - m.w/2; let locY = cursorY + rel_char_h/2 - m.h/2; 
                                mCmd += `    $dx = (${locX.toFixed(6)} * $zoom_global)\n    $dy = (${locY.toFixed(6)} * $zoom_global)\n`;
                                mCmd += `    $rx = $dx * $aspect\n    $ry = $dy\n`;
                                mCmd += `    $cx = $abs_x_${i} + $abs_w_${i}*0.5 + ($rx * $cos_${i} - $ry * $sin_${i}) / $aspect\n`;
                                mCmd += `    $cy = $abs_y_${i} + $abs_h_${i}*0.5 + ($rx * $sin_${i} + $ry * $cos_${i})\n`;
                                let col = overrides[globalIdx] || defCol;
                                let hex = c.charCodeAt(0).toString(16).toUpperCase();
                                let colHex = col.replace('#','').toUpperCase();
                                let resKey = `${hex}_${colHex}`;
                                mCmd += `    ps-t100=Resource_Char_${resKey}\n x87=$sw\n y87=$sh\n z87=$cx - $sw*0.5\n w87=$cy - $sh*0.5\n ${bp} run=CustomShaderDraw\n`;
                            }
                            cursorX += rel_char_w; globalIdx++;
                        }
                        if(pIdx < parts.length - 1 && m.valVar) {
                            let numHexColor = defCol.replace('#','').toUpperCase();
                            let drawDigit = (digitVar) => {
                                let locX = cursorX + rel_char_w/2 - m.w/2; let locY = cursorY + rel_char_h/2 - m.h/2;
                                mCmd += `    $dx = (${locX.toFixed(6)} * $zoom_global)\n    $dy = (${locY.toFixed(6)} * $zoom_global)\n`;
                                mCmd += `    $rx = $dx * $aspect\n    $ry = $dy\n`;
                                mCmd += `    $cx = $abs_x_${i} + $abs_w_${i}*0.5 + ($rx * $cos_${i} - $ry * $sin_${i}) / $aspect\n`;
                                mCmd += `    $cy = $abs_y_${i} + $abs_h_${i}*0.5 + ($rx * $sin_${i} + $ry * $cos_${i})\n`;
                                for(let d=0; d<=9; d++) {
                                    let digitHex = d.toString().charCodeAt(0).toString(16).toUpperCase();
                                    mCmd += `    if ${digitVar} == ${d}\n ps-t100=Resource_Char_${digitHex}_${numHexColor}\n endif\n`;
                                }
                                mCmd += `    x87=$sw\n y87=$sh\n z87=$cx - $sw*0.5\n w87=$cy - $sh*0.5\n ${bp} run=CustomShaderDraw\n`;
                                cursorX += rel_char_w; 
                            };
                            mCmd += `    if $val_int >= 100\n`; drawDigit('$d3'); mCmd += `    endif\n`;
                            mCmd += `    if $val_int >= 10\n`;  drawDigit('$d2'); mCmd += `    endif\n`;
                            drawDigit('$d1');
                            globalIdx += 5; 
                        }
                    }
                } else if (m.type !== 'text' && m.type !== 'toggle') {
                    mCmd += `    $sw = $hs_${i}*$zoom_global\n $sh = $sw*$aspect\n $tt = $tt_${i}*$zoom_global\n`;
                    mCmd+=`    ps-t100=${getRes(m.paths.bar_r)}\n`;
                    if(m.type==='slider_h') mCmd+=`    x87=$abs_w_${i}\n y87=$tt\n z87=$abs_x_${i}\n w87=$abs_y_${i} + $abs_h_${i}*0.5 - $tt*0.5\n`;
                    else if(m.type==='slider_v') mCmd+=`    x87=$tt\n y87=$abs_h_${i}\n z87=$abs_x_${i} + $abs_w_${i}*0.5 - $tt*0.5\n w87=$abs_y_${i}\n`;
                    else { 
                        mCmd+=`    x87=$abs_w_${i}\n y87=$tt\n z87=$abs_x_${i}\n w87=$abs_y_${i}+($abs_h_${i}-$tt)*0.5\n ${bp} run=CustomShaderDraw\n`;
                        mCmd+=`    x87=$tt\n y87=$abs_h_${i}\n z87=$abs_x_${i}+($abs_w_${i}-$tt)*0.5\n w87=$abs_y_${i}\n`; 
                    }
                    mCmd+=`    ${bp} run=CustomShaderDraw\n`;
                    if(m.type.includes('slider')) {
                        if(m.type==='slider_h') {
                            mCmd+=`    $w_draw = $val_${i} * $abs_w_${i}\n`;
                            mCmd+=`    $dx = ($w_draw * 0.5) - ($abs_w_${i} * 0.5)\n`;
                            mCmd+=`    $rx = $dx * $aspect\n    $ry = 0\n`;
                            mCmd+=`    $cx = $abs_x_${i} + $abs_w_${i}*0.5 + ($rx * $cos_${i} - $ry * $sin_${i}) / $aspect\n`;
                            mCmd+=`    $cy = $abs_y_${i} + $abs_h_${i}*0.5 + ($rx * $sin_${i} + $ry * $cos_${i})\n`;
                            mCmd+=`    ps-t100=${getRes(m.paths.bar_l)}\n x87=$w_draw\n y87=$tt\n z87=$cx - $w_draw*0.5\n w87=$cy - $tt*0.5\n ${bp} run=CustomShaderDraw\n`;
                        } else if(m.type==='slider_v') {
                            mCmd+=`    $h_draw = $val_${i} * $abs_h_${i}\n`;
                            mCmd+=`    $dy = ($abs_h_${i} * 0.5) - ($h_draw * 0.5)\n`;
                            mCmd+=`    $rx = 0\n    $ry = $dy\n`;
                            mCmd+=`    $cx = $abs_x_${i} + $abs_w_${i}*0.5 + ($rx * $cos_${i} - $ry * $sin_${i}) / $aspect\n`;
                            mCmd+=`    $cy = $abs_y_${i} + $abs_h_${i}*0.5 + ($rx * $sin_${i} + $ry * $cos_${i})\n`;
                            mCmd+=`    ps-t100=${getRes(m.paths.bar_l)}\n x87=$tt\n y87=$h_draw\n z87=$cx - $tt*0.5\n w87=$cy - $h_draw*0.5\n ${bp} run=CustomShaderDraw\n`;
                        }
                    }
                    mCmd+=`    ps-t100=${getRes(m.paths.handle)}\n x87=$sw\n y87=$sh\n z87=$r_hdl_${i}_x\n w87=$r_hdl_${i}_y\n ${bp} run=CustomShaderDraw\n`;
                }

                mCmd += endDraw;
                renderQueue.push({ z: m.zIndex || 0, cmd: mCmd });
            });

            renderQueue.sort((a,b) => a.z - b.z).forEach(item => t+= item.cmd);
            t+=`endif\n\n[CustomShaderDraw]\nhs=null\nds=null\ngs=null\ncs=null\nvs=./res/draw_2d.hlsl\nps=./res/draw_2d.hlsl\nblend=ADD SRC_ALPHA INV_SRC_ALPHA\ncull=none\ntopology=triangle_strip\no0=set_viewport bb\nDraw=4,0\nclear=ps-t100\n`;

            if(showModal) {
                document.getElementById('output').value = t;
                document.getElementById('modal').style.display = 'flex';
            }

            return t;
        } catch (e) {
            console.error(e);
            alert("生成配置失败！错误信息:\n" + e.message + "\n\n请检查控制台获取详细信息。");
            return '';
        }
    }

    function generateINI() {
        buildGeneratedINI(true);
    }
</script>
</body>
